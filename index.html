    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />

    <!-- Fonts: preconnect + single stylesheet, display=swap to keep LCP fast -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@300;500&display=swap"
    />

    <!-- Preload hero LCP image so it lands in parallel with the JS bundle. -->
    <link rel="preload" as="image" href="/bonfire.jpg" fetchpriority="high" />

    <!-- JSON-LD: Person + WebSite schemas. Person is the identity hub; WebSite ties the domain to it. -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Maximilian Wikström",
        "alternateName": "Max Wik",
        "jobTitle": "AI & Automation Specialist",
        "description": "AI & Automation Specialist working on Copilot Studio, Power Automate, agentic AI, and identity governance in regulated banking.",
        "image": "https://maximilian-wikstrom.vercel.app/bonfire.jpg",
        "url": "https://maximilian-wikstrom.vercel.app/",
        "sameAs": [
          "https://max-wik.com/",
          "https://tessera-neon.vercel.app/",
          "https://cursedechoes.vercel.app/",
          "https://www.instagram.com/max_wik/",
          "https://github.com/MaximilianWik",
          "https://www.linkedin.com/in/maximilian-wikström/?locale=en"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Maximilian Wikström — Portfolio",
        "url": "https://maximilian-wikstrom.vercel.app/",
        "author": {
          "@type": "Person",
          "name": "Maximilian Wikström"
        }
      }
    ]
    </script>
